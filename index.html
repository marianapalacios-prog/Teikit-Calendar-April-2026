<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teikit — Calendario Abril 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #171923;
    --bg3: #1e2130;
    --bg4: #252940;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --text2: #8b93b0;
    --text3: #555d7a;
    --accent: #4f83e0;
    --accent-soft: rgba(79,131,224,0.12);
    --purple: #7c6fe0;
    --purple-soft: rgba(124,111,224,0.15);
    --purple-light: #afa9ec;
    --green: #2dce89;
    --green-soft: rgba(45,206,137,0.12);
    --green-light: #5dcaa5;
    --orange: #e06b3a;
    --orange-soft: rgba(224,107,58,0.14);
    --orange-light: #f0997b;
    --red: #e05252;
    --red-soft: rgba(224,82,82,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 28px 24px 60px;
  }

  .page-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .logo-pill {
    background: var(--orange);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .page-sub {
    font-size: 13px;
    color: var(--text3);
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .select-wrap {
    flex: 1;
    min-width: 220px;
    max-width: 340px;
    position: relative;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    pointer-events: none;
    font-size: 13px;
  }
  select {
    width: 100%;
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 34px 9px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus { border-color: var(--accent); }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }
  .leg-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .leg-swatch {
    width: 28px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .stat-val {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }
  .stat-val.danger { color: var(--red); }
  .stat-val.warn { color: var(--orange); }

  .cal-wrapper { position: relative; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-header {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .day-cell {
    border-radius: var(--radius-sm);
    padding: 8px 9px;
    min-height: 82px;
    cursor: pointer;
    position: relative;
    border: 1.5px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
  }
  .day-cell:hover { transform: scale(1.04); z-index: 2; border-color: rgba(255,255,255,0.25); }
  .day-cell.empty { background: transparent; cursor: default; min-height: 82px; }
  .day-cell.empty:hover { transform: none; border-color: transparent; }
  .day-cell.zero { opacity: 0.3; }
  .day-cell.active { border-color: rgba(255,255,255,0.5) !important; transform: scale(1.04); z-index: 3; }

  .day-num {
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 3px;
    opacity: 0.75;
  }
  .orders-big {
    font-size: 20px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 1px;
    font-family: 'DM Mono', monospace;
  }
  .sales-small {
    font-size: 10px;
    opacity: 0.65;
    font-family: 'DM Mono', monospace;
  }
  .promo-dots {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .pdot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .defect-dot {
    position: absolute;
    top: 7px; right: 8px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
  }

  /* Panel */
  .panel-overlay {
    display: none;
    margin-top: 6px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border2);
    background: var(--bg2);
    box-shadow: var(--shadow);
    animation: slideDown 0.18s ease;
  }
  @keyframes slideDown {
    from { opacity:0; transform: translateY(-8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-date {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .panel-dow {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .close-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg4);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: background 0.12s, color 0.12s;
    line-height: 1;
    flex-shrink: 0;
  }
  .close-btn:hover { background: var(--bg3); color: var(--text); }

  .panel-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .pm {
    padding: 14px 18px;
    border-right: 1px solid var(--border);
  }
  .pm:last-child { border-right: none; }
  .pm-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .pm-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }
  .pm-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
  }

  .panel-promos { padding: 14px 20px; }
  .promos-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 10px;
  }
  .promo-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 8px;
    border: 1px solid transparent;
  }
  .promo-row:last-child { margin-bottom: 0; }
  .promo-row.pct { background: var(--purple-soft); border-color: rgba(124,111,224,0.2); }
  .promo-row.mov { background: var(--green-soft); border-color: rgba(45,206,137,0.2); }
  .promo-row.x21 { background: var(--orange-soft); border-color: rgba(224,107,58,0.2); }

  .promo-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .pi-pct { background: var(--purple); color: #fff; }
  .pi-mov { background: var(--green); color: #0a2a1e; }
  .pi-x21 { background: var(--orange); color: #fff; }

  .promo-body { flex: 1; }
  .promo-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .promo-name.pct { color: var(--purple-light); }
  .promo-name.mov { color: var(--green-light); }
  .promo-name.x21 { color: var(--orange-light); }

  .promo-detail {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }

  .no-promos {
    padding: 10px 0 6px;
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
  }

  .defect-banner {
    margin: 0 20px 16px;
    padding: 10px 14px;
    background: var(--red-soft);
    border: 1px solid rgba(224,82,82,0.25);
    border-radius: var(--radius);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .defect-icon {
    color: var(--red);
    font-size: 18px;
    flex-shrink: 0;
  }
  .defect-text {
    font-size: 13px;
    color: #e08080;
    line-height: 1.4;
  }
  .defect-text strong { color: var(--red); }
</style>
</head>

const DEFECT = new Set(["Teikit Interlomas","Teikit San Javier Pachuca","Teikit Las Antenas","Teikit Universidad","Teikit City Shop del valle","Teikit Narvarte","Teikit Aragón","Teikit Las Águilas","Teikit Rio Lerma","Teikit San Jeronimo"]);
const DAYS_ES = ['dom','lun','mar','mié','jue','vie','sáb'];
const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function getPromos(dateStr) {
  const d = new Date(dateStr + 'T12:00:00'), w = d.getDay(), r = [];
  if (w >= 1 && w <= 4) r.push('pct');
  if (w === 2 || w === 3 || w === 5 || w === 6 || w === 0) r.push('mov');
  if (w === 5 || w === 6 || w === 0) r.push('x21');
  return r;
}

function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
function cellBg(o, max) {
  if (o === 0) return '#1a1e2e';
  const t = Math.min(o / max, 1);
  return `rgb(${lerp(20,18,t)},${lerp(30,60,t)},${lerp(60,165,t)})`;
}
function cellTextColor(o, max) {
  if (o === 0) return '#3a4060';
  return Math.min(o / max, 1) > 0.4 ? '#e8f0ff' : '#8bb8f0';
}

const stores = Object.keys(DATA).sort();
const ss = document.getElementById('ss');
stores.forEach(s => {
  const op = document.createElement('option');
  op.value = s; op.textContent = s;
  ss.appendChild(op);
});
ss.value = 'Teikit Universidad';

let openCell = null;

function closePanel() {
  document.getElementById('po').style.display = 'none';
  if (openCell) { openCell.classList.remove('active'); openCell = null; }
}

function showPanel(cell, store, dateStr, data) {
  if (openCell === cell) { closePanel(); return; }
  closePanel();
  openCell = cell;
  cell.classList.add('active');

  const d = new Date(dateStr + 'T12:00:00');
  const ps = getPromos(dateStr);
  const hasD = DEFECT.has(store);
  const mdPct = data.s > 0 ? Math.round(data.m / data.s * 100) : 0;

  const promoData = {
    pct: { cls: 'pct', icon: '%', name: '50% Rollos Clásicos', detail: 'Descuento en rollos clásicos · Lunes a jueves · 13:00 – 22:00 h' },
    mov: { cls: 'mov', icon: '$', name: 'MOV $40 para nuevos usuarios', detail: 'Mínimo de compra $499, descuento $40 · Mar / Mié / Vie / Sáb / Dom · 13–22 h' },
    x21: { cls: 'x21', icon: '2×', name: '2×1 Dragon, D\'Rico y Geisha', detail: 'Dos por uno en makis seleccionados · Viernes a domingo · 13:00 – 22:00 h' }
  };

  let promoHTML = '';
  if (ps.length) {
    promoHTML = '<div class="panel-promos"><div class="promos-title">Promociones activas este día</div>';
    ps.forEach(p => {
      const pm = promoData[p];
      promoHTML += `<div class="promo-row ${pm.cls}">
        <div class="promo-icon pi-${p}">${pm.icon}</div>
        <div class="promo-body">
          <div class="promo-name ${pm.cls}">${pm.name}</div>
          <div class="promo-detail">${pm.detail}</div>
        </div>
      </div>`;
    });
    promoHTML += '</div>';
  } else {
    promoHTML = '<div class="no-promos" style="padding:12px 20px 16px">Sin promociones activas este día</div>';
  }

  const defectHTML = hasD ? `<div class="defect-banner">
    <div class="defect-icon">⚠</div>
    <div class="defect-text"><strong>Alerta de defectos activa</strong> — Esta sucursal aparece con issues de defect rate en el reporte operativo abr–may 2026.</div>
  </div>` : '';

  document.getElementById('panel').innerHTML = `
    <div class="panel-head">
      <div>
        <div class="panel-date">${d.getDate()} de ${MONTHS_ES[d.getMonth()]} 2026</div>
        <div class="panel-dow">${DAYS_ES[d.getDay()].charAt(0).toUpperCase() + DAYS_ES[d.getDay()].slice(1)} · ${store}</div>
      </div>
      <button class="close-btn" id="pcb" title="Cerrar">✕</button>
    </div>
    <div class="panel-metrics">
      <div class="pm"><div class="pm-label">Órdenes</div><div class="pm-val">${data.o}</div></div>
      <div class="pm"><div class="pm-label">Ventas brutas</div><div class="pm-val">$${data.s.toLocaleString('es-MX')}</div></div>
      <div class="pm"><div class="pm-label">Descuentos</div><div class="pm-val">$${data.m.toLocaleString('es-MX')}</div><div class="pm-sub">${mdPct}% del GMV</div></div>
    </div>
    ${promoHTML}
    ${defectHTML}
  `;

  document.getElementById('po').style.display = 'block';
  document.getElementById('pcb').addEventListener('click', closePanel);
}

document.addEventListener('click', e => {
  const po = document.getElementById('po');
  if (po.style.display === 'block' && !po.contains(e.target) && !e.target.closest('.day-cell')) closePanel();
});

function render() {
  const store = ss.value;
  const sd = DATA[store] || {};
  const allO = Object.values(sd).map(d => d.o);
  const maxO = Math.max(...allO, 1);
  const totO = allO.reduce((a, b) => a + b, 0);
  const totS = Object.values(sd).reduce((a, d) => a + d.s, 0);
  const zeroDays = allO.filter(o => o === 0).length;
  const hasD = DEFECT.has(store);

  closePanel();

  document.getElementById('sr').innerHTML = `
    <div class="stat-card"><div class="stat-label">Órdenes totales</div><div class="stat-val">${totO}</div></div>
    <div class="stat-card"><div class="stat-label">Ventas brutas</div><div class="stat-val">$${Math.round(totS / 1000)}k</div></div>
    <div class="stat-card"><div class="stat-label">Días sin órdenes</div><div class="stat-val danger">${zeroDays}</div></div>
    <div class="stat-card"><div class="stat-label">Alerta defecto</div><div class="stat-val ${hasD ? 'warn' : ''}">${hasD ? 'Activa' : '—'}</div></div>
  `;

  const cg = document.getElementById('cg');
  cg.innerHTML = '';
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'day-header';
    h.textContent = d;
    cg.appendChild(h);
  });

  const offset = (new Date('2026-04-01T12:00:00').getDay() + 6) % 7;
  for (let i = 0; i < offset; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    cg.appendChild(e);
  }

  for (let day = 1; day <= 30; day++) {
    const ds = `2026-04-${String(day).padStart(2, '0')}`;
    const dd = sd[ds] || { o: 0, s: 0, m: 0 };
    const ps = getPromos(ds);
    const bg = cellBg(dd.o, maxO);
    const tc = cellTextColor(dd.o, maxO);

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (dd.o === 0 ? ' zero' : '');
    cell.style.background = bg;

    const defDot = hasD ? '<div class="defect-dot"></div>' : '';
    const dots = ps.length ? `<div class="promo-dots">${ps.map(p => `<div class="pdot" style="background:${p==='pct'?'#7c6fe0':p==='mov'?'#2dce89':'#e06b3a'}"></div>`).join('')}</div>` : '';

    cell.innerHTML = `${defDot}
      <div class="day-num" style="color:${tc}">${day}</div>
      <div class="orders-big" style="color:${tc}">${dd.o}</div>
      <div class="sales-small" style="color:${tc}">${dd.s > 0 ? '$' + (dd.s / 1000).toFixed(1) + 'k' : ''}</div>
      ${dots}`;

    cell.addEventListener('click', () => showPanel(cell, store, ds, dd));
    cg.appendChild(cell);
  }
}

ss.addEventListener('change', render);
render();
</script>
